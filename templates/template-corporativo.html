<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantilla CV Corporativa</title>
  <style>
    :root {
      --paper: #f6f5f6;
      --left: #ddd9dc;
      --ink: #202736;
      --muted: #374151;
      --line: #6b6f76;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #ececec, #f7f7f8);
      color: var(--ink);
    }

    .cv-sheet {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 44% 56%;
      background: var(--paper);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #c9c5c8;
      box-shadow: 0 20px 44px rgba(15, 23, 42, 0.12);
    }

    .sidebar {
      background: var(--left);
      color: #1f2937;
      padding: 26px 20px;
    }

    .photo {
      width: 196px;
      height: 196px;
      border-radius: 999px;
      object-fit: cover;
      border: 4px solid #eceff3;
      display: block;
      margin: 0 auto 20px;
      background: #d1d5db;
    }

    .sidebar h3 {
      margin: 0 0 8px;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .sidebar section {
      margin-bottom: 18px;
    }

    .sidebar section:last-child {
      margin-bottom: 0;
    }

    .sidebar p,
    .sidebar li {
      margin: 0 0 7px;
      color: #1f2937;
      font-size: 13.5px;
      line-height: 1.55;
    }

    .sidebar ul {
      margin: 0;
      padding-left: 18px;
    }

    .content {
      background: #f7f7f8;
      padding: 24px 22px;
      line-height: 1.58;
      color: var(--ink);
    }

    .hero {
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 3px solid var(--line);
    }

    .hero h1 {
      margin: 0;
      font-size: 40px;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.08;
    }

    .hero p {
      margin: 8px 0 0;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-style: italic;
      color: #374151;
    }

    .content h3 {
      margin: 0 0 10px;
      color: #101622;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-size: 18px;
    }

    .content p {
      margin: 0 0 9px;
      color: #242d3a;
      font-size: 13.5px;
      overflow-wrap: anywhere;
    }

    .content ul {
      margin: 0;
      padding-left: 18px;
    }

    .content li {
      margin-bottom: 6px;
      color: #202938;
      font-size: 13.5px;
    }

    .content section {
      padding: 0;
      margin-bottom: 18px;
      border-bottom: 0;
    }

    .content section:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    @media (max-width: 860px) {
      body {
        padding: 12px;
      }

      .cv-sheet {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <article class="cv-sheet">
    <aside class="sidebar">
      <img class="photo" src="{{IMAGE_URL}}" alt="Foto profesional">

      <section>
        <h3>Core strengths</h3>
        <ul>
          <li>Pensamiento analitico y orientacion a resultados.</li>
          <li>Capacidad para trabajo colaborativo y liderazgo.</li>
          <li>Adaptabilidad a entornos dinamicos.</li>
        </ul>
      </section>

      <section>
        <h3>Technical skills</h3>
        <p>Incluye aqui lenguajes, herramientas y tecnologias clave.</p>
      </section>
    </aside>

    <main class="content">
      <header class="hero">
        <h1>Curriculum Vitae</h1>
        <p>Professional profile</p>
      </header>

      {{CV_CONTENT}}
    </main>
  </article>
</body>
</html>

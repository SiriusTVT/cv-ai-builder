<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantilla CV Corporativa</title>
  <style>
    :root {
      --bg: #e9eef5;
      --panel: #ffffff;
      --ink: #101828;
      --muted: #475467;
      --accent: #0f172a;
      --line: #d0d5dd;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e9eef5, #d7e3f4);
      color: var(--ink);
    }

    .cv-sheet {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 280px 1fr;
      background: var(--panel);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
    }

    .sidebar {
      background: var(--accent);
      color: #f8fafc;
      padding: 28px;
    }

    .photo {
      width: 148px;
      height: 148px;
      border-radius: 999px;
      object-fit: cover;
      border: 4px solid rgba(248, 250, 252, 0.65);
      display: block;
      margin: 0 auto 20px;
      background: #1f2937;
    }

    .sidebar h1 {
      margin: 0 0 10px;
      font-size: 22px;
      text-align: center;
      letter-spacing: 0.4px;
    }

    .sidebar p {
      margin: 0;
      font-size: 14px;
      line-height: 1.65;
      color: #d1d5db;
      text-align: center;
    }

    .content {
      padding: 34px;
      line-height: 1.65;
      color: var(--ink);
    }

    .content h2,
    .content h3 {
      margin: 0 0 10px;
      color: #0b1324;
      letter-spacing: 0.2px;
    }

    .content p {
      margin: 0 0 12px;
      color: var(--muted);
    }

    .content ul {
      margin: 0 0 14px;
      padding-left: 20px;
      color: var(--muted);
    }

    .content li {
      margin-bottom: 7px;
    }

    .content section {
      padding-bottom: 14px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--line);
    }

    .content section:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    @media (max-width: 860px) {
      body {
        padding: 12px;
      }

      .cv-sheet {
        grid-template-columns: 1fr;
      }

      .sidebar {
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <article class="cv-sheet">
    <aside class="sidebar">
      <img class="photo" src="{{IMAGE_URL}}" alt="Foto profesional">
      <h1>Perfil Profesional</h1>
      <p>Diseno corporativo con barra lateral para destacar marca personal, contacto y fortalezas.</p>
    </aside>

    <main class="content">
      {{CV_CONTENT}}
    </main>
  </article>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantilla CV Minimal</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --paper: #ffffff;
      --ink: #141414;
      --muted: #4b5563;
      --line: #dfdcd2;
      --accent: #0d9488;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 28px;
      font-family: "Source Sans Pro", "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 12%, #dcefe8 0%, transparent 42%),
        radial-gradient(circle at 88% 85%, #efe8d9 0%, transparent 46%),
        var(--bg);
      color: var(--ink);
    }

    .cv-sheet {
      max-width: 860px;
      margin: 0 auto;
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 34px;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.09);
    }

    .hero {
      text-align: center;
      padding-bottom: 20px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--line);
    }

    .avatar {
      width: 112px;
      height: 112px;
      border-radius: 999px;
      object-fit: cover;
      border: 3px solid var(--accent);
      margin-bottom: 10px;
      background: #d1d5db;
    }

    .hero h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.35px;
    }

    .content h2,
    .content h3 {
      margin: 0 0 10px;
      font-size: 19px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .content p {
      margin: 0 0 12px;
      color: #1f2937;
      line-height: 1.7;
    }

    .content ul {
      margin: 0 0 12px;
      padding-left: 18px;
      line-height: 1.65;
      color: #1f2937;
    }

    .content li {
      margin-bottom: 6px;
    }

    .content section {
      margin-bottom: 16px;
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      .cv-sheet {
        padding: 20px;
      }

      .hero h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <article class="cv-sheet">
    <header class="hero">
      <img class="avatar" src="{{IMAGE_URL}}" alt="Foto de perfil">
      <h1>Curriculum Vitae</h1>
      <p>Enfoque limpio, centrado y legible para procesos formales.</p>
    </header>

    <section class="content">
      {{CV_CONTENT}}
    </section>
  </article>
</body>
</html>

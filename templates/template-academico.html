<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantilla CV Academico</title>
  <style>
    :root {
      --ink: #1e293b;
      --muted: #475569;
      --line: #d8deea;
      --surface: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Merriweather", Georgia, "Times New Roman", serif;
      background: linear-gradient(135deg, #f8fafc, #eef2ff);
      color: var(--ink);
    }

    .sheet {
      max-width: 980px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(30, 41, 59, 0.11);
    }

    .head {
      display: grid;
      grid-template-columns: 126px 1fr;
      gap: 16px;
      align-items: center;
      padding: 24px;
      background: #f8f9fc;
    }

    .photo {
      width: 112px;
      height: 112px;
      border-radius: 999px;
      object-fit: cover;
      border: 3px solid #d1d5db;
      background: #d1d5db;
    }

    .head h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
    }

    .head p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .divider {
      height: 3px;
      background: linear-gradient(90deg, #334155, #64748b, #94a3b8);
    }

    .content {
      padding: 24px;
      line-height: 1.72;
    }

    .content section {
      margin-bottom: 14px;
    }

    .content section:last-child {
      margin-bottom: 0;
    }

    .content h2,
    .content h3 {
      margin: 0 0 10px;
      color: #0f172a;
      letter-spacing: 0.2px;
    }

    .content p {
      margin: 0 0 10px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .content ul {
      margin: 0;
      padding-left: 22px;
      color: var(--muted);
    }

    .content li {
      margin-bottom: 6px;
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
      }

      .head {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .photo {
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <article class="sheet">
    <header class="head">
      <img class="photo" src="{{IMAGE_URL}}" alt="Foto profesional">
      <div>
        <h1>CV Academico</h1>
        <p>Formato formal para perfiles de investigacion, docencia y proyectos institucionales.</p>
      </div>
    </header>

    <div class="divider"></div>

    <main class="content">
      {{CV_CONTENT}}
    </main>
  </article>
</body>
</html>

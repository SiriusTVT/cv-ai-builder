<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantilla CV Moderno</title>
  <style>
    :root {
      --ink: #102a43;
      --muted: #334e68;
      --line: #c6d8e5;
      --surface: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Poppins", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at 8% 8%, rgba(20, 184, 166, 0.18), transparent 32%),
        radial-gradient(circle at 90% 12%, rgba(245, 158, 11, 0.15), transparent 36%),
        #f9fbfc;
      color: var(--ink);
    }

    .sheet {
      max-width: 980px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(16, 42, 67, 0.12);
    }

    .head {
      display: grid;
      grid-template-columns: 1fr 132px;
      gap: 16px;
      align-items: center;
      padding: 24px;
      border-bottom: 1px solid var(--line);
    }

    .photo {
      width: 120px;
      height: 120px;
      border-radius: 18px;
      object-fit: cover;
      border: 3px solid #dbe7f0;
      background: #d1d5db;
    }

    .head h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
    }

    .head p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .content {
      padding: 24px;
      line-height: 1.65;
    }

    .content section {
      border-bottom: 1px dashed var(--line);
      padding-bottom: 10px;
      margin-bottom: 12px;
    }

    .content section:last-child {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .content h2,
    .content h3 {
      margin: 0 0 9px;
      color: #0b253f;
    }

    .content p {
      margin: 0 0 10px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }

    .content ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }

    .content li {
      margin-bottom: 6px;
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
      }

      .head {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .photo {
        margin: 0 auto;
      }
    }
  </style>
</head>
<body>
  <article class="sheet">
    <header class="head">
      <div>
        <h1>CV Moderno</h1>
        <p>Composicion editorial limpia con separadores para lectura rapida.</p>
      </div>
      <img class="photo" src="{{IMAGE_URL}}" alt="Foto profesional">
    </header>

    <main class="content">
      {{CV_CONTENT}}
    </main>
  </article>
</body>
</html>

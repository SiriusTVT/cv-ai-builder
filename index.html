<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CV Builder IA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Generador de Hojas de Vida con IA</h1>

  <div class="container">

    <div class="form">
      <div class="api-config">
        <h3>🔑 Configuración API</h3>
        <input id="apiKey" type="password" placeholder="Ingresa tu token de Hugging Face (hf_...)">
        <small>¿No tienes token? <a href="https://huggingface.co/settings/tokens/new?ownUserPermissions=inference.serverless.write&tokenType=fineGrained" target="_blank">Créalo aquí (incluye créditos mensuales gratis)</a></small>
        <button onclick="guardarAPIKey()" class="btn-secondary">Guardar Clave</button>
        <div id="apiStatus"></div>
      </div>

      <hr>

      <textarea id="inputLibre" class="raw-input" placeholder="Pega aquí toda tu información (nombre, experiencia, estudios, habilidades, logros, etc.). La IA la organizará automáticamente en un CV profesional."></textarea>
      <small class="helper-text">Ejemplo: "Soy Ana, desarrolladora frontend con 3 años de experiencia en React..."</small>

      <button onclick="generarCV()">Generar con IA</button>
      <button onclick="descargarPDF()">Descargar PDF</button>
    </div>

    <div class="preview" id="preview">
      <h2>Tu hoja de vida aparecerá aquí</h2>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
